// HTML escape for trusted template data
function esc(str) {
  if (!str) return '';
  var d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function render(customData) {
  var data = customData || defaultData;
  var pages = [];

  pages.push({ type: 'cover', data: data });
  if (data.intro) pages.push({ type: 'intro', data: data.intro });

  if (data.pointsPages && data.pointsPages.length > 0) {
    data.pointsPages.forEach(function(pp) { pages.push({ type: 'points', data: pp }); });
  } else if (data.points && data.points.length > 0) {
    pages.push({ type: 'points', data: { label: data.pointsLabel || '\u8981\u70b9', count: data.points.length, items: data.points } });
  }

  if (data.quotes && data.quotes.length > 0) {
    data.quotes.forEach(function(q) { pages.push({ type: 'quote', data: q }); });
  }
  if (data.insight) pages.push({ type: 'insight', data: data.insight });
  pages.push({ type: 'end', data: { takeaway: data.takeaway, footer: data.footer || {} } });

  var output = document.getElementById('output');
  output.textContent = '';
  pages.forEach(function(page) {
    var node;
    switch (page.type) {
      case 'cover': node = buildCover(page.data); break;
      case 'intro': node = buildIntro(page.data); break;
      case 'points': node = buildPoints(page.data); break;
      case 'quote': node = buildQuote(page.data); break;
      case 'insight': node = buildInsight(page.data); break;
      case 'end': node = buildEnd(page.data); break;
    }
    if (node) output.appendChild(node);
  });
  adjustTitleFontSize();
}

function adjustTitleFontSize() {
  document.querySelectorAll('.cover-title').forEach(function(title) {
    var fs = parseInt(getComputedStyle(title).fontSize) || 38;
    var slh = fs * 1.25;
    while (title.scrollHeight > slh * 1.5 && fs > 22) { fs -= 1; title.style.fontSize = fs + 'px'; }
  });
}

/* ============ 封面 ============ */
function buildCover(data) {
  var card = document.createElement('div');
  card.className = 'card card-cover';

  // 顶部横条
  var topBar = document.createElement('div');
  topBar.className = 'cover-top-bar';
  var logoStrip = document.createElement('div');
  logoStrip.className = 'cover-logos-strip';
  if (data.logos) {
    data.logos.forEach(function(logo) {
      var item = document.createElement('div');
      item.className = 'cover-logo-sm';
      var img = document.createElement('img');
      img.src = logo.url; img.alt = logo.name;
      img.onerror = function() { this.parentElement.textContent = logo.name.charAt(0); this.parentElement.style.cssText = 'font-weight:700;color:#C65D3B;font-size:16px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;'; };
      item.appendChild(img);
      logoStrip.appendChild(item);
    });
  }
  topBar.appendChild(logoStrip);

  if (data.starBadge) {
    var badge = document.createElement('div');
    badge.className = 'cover-star-badge';
    var label = document.createElement('span');
    label.className = 'star-label';
    var starIcon = document.createElement('span');
    starIcon.className = 'star-icon'; starIcon.textContent = '\u2605';
    label.appendChild(starIcon);
    label.appendChild(document.createTextNode(' Star'));
    badge.appendChild(label);
    var count = document.createElement('span');
    count.className = 'star-count'; count.textContent = data.starBadge;
    badge.appendChild(count);
    topBar.appendChild(badge);
  }
  card.appendChild(topBar);

  // 中央
  var center = document.createElement('div');
  center.className = 'cover-center';
  if (data.tags) {
    var tagLine = document.createElement('div');
    tagLine.className = 'cover-tag-line';
    (Array.isArray(data.tags) ? data.tags : [data.tags]).forEach(function(t) {
      var span = document.createElement('span');
      span.className = 'cover-tag'; span.textContent = t;
      tagLine.appendChild(span);
    });
    center.appendChild(tagLine);
  }
  var h1 = document.createElement('h1');
  h1.className = 'cover-title';
  // title may contain <br> for line breaks - this is trusted template data
  h1.innerHTML = data.title;
  center.appendChild(h1);
  if (data.subtitle) {
    var sub = document.createElement('p');
    sub.className = 'cover-subtitle'; sub.textContent = data.subtitle;
    center.appendChild(sub);
  }
  card.appendChild(center);

  // 底部关键词
  if (data.keywords && data.keywords.length > 0) {
    var bottomBar = document.createElement('div');
    bottomBar.className = 'cover-bottom-bar';
    data.keywords.forEach(function(kw) {
      var pill = document.createElement('span');
      pill.className = 'cover-kw-pill'; pill.textContent = kw;
      bottomBar.appendChild(pill);
    });
    card.appendChild(bottomBar);
  }
  return card;
}

  title.className = 'section-title'; title.textContent = data.question;
  body.appendChild(title);

  var text = document.createElement('p');
  text.className = 'section-text'; text.textContent = data.answer;
  body.appendChild(text);

  if (data.flowChart) {
    var wrap = document.createElement('div');
    wrap.style.marginTop = '16px';
    // Build flowchart using trusted template data
    var html = '<div style="width:100%;padding:12px;background:#FDF8F3;border-radius:12px;">'
      + '<div style="text-align:center;font-size:11px;font-weight:600;color:#C65D3B;margin-bottom:12px;">' + esc(data.flowChart.title) + '</div>'
      + '<div style="display:flex;gap:10px;">'
      + '<div style="flex:1;padding:10px;border-radius:10px;background:#fff;border:1px dashed #ddd;">'
      + '<div style="font-size:10px;font-weight:600;margin-bottom:6px;color:#999;">\u274c ' + esc(data.flowChart.oldLabel) + '</div>'
      + '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#888;flex-wrap:wrap;justify-content:center;">'
      + data.flowChart.oldSteps.map(function(s,i){ return (i>0?'<span style="color:#ccc;">\u2192</span>':'') + '<span style="background:#f5f5f5;padding:3px 6px;border-radius:4px;">' + esc(s) + '</span>'; }).join('')
      + '</div></div>'
      + '<div style="flex:1;padding:10px;border-radius:10px;background:rgba(198,93,59,0.03);border:2px solid #C65D3B;">'
      + '<div style="font-size:10px;font-weight:600;margin-bottom:6px;color:#C65D3B;">\u2705 ' + esc(data.flowChart.newLabel) + '</div>'
      + '<div style="display:flex;align-items:center;gap:4px;font-size:10px;color:#C65D3B;flex-wrap:wrap;justify-content:center;">'
      + data.flowChart.newSteps.map(function(s,i){ return (i>0?'<span>\u2192</span>':'') + '<span style="background:rgba(198,93,59,0.1);padding:3px 6px;border-radius:4px;">' + esc(s) + '</span>'; }).join('')
      + '</div></div></div></div>';
    wrap.innerHTML = html;
    body.appendChild(wrap);
  } else if (data.workflow) {
    var wrap2 = document.createElement('div');
    wrap2.style.marginTop = '16px';
    var steps = data.workflow.steps || [];
    var wHtml = '<div style="width:100%;padding:16px;background:#FDF8F3;border-radius:12px;">'
      + (data.workflow.title ? '<div style="text-align:center;font-size:12px;font-weight:600;color:#C65D3B;margin-bottom:16px;">' + esc(data.workflow.title) + '</div>' : '')
      + '<div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;">'
      + steps.map(function(step,i){ return '<div style="display:flex;align-items:center;gap:8px;"><div style="background:#fff;border:2px solid #C65D3B;border-radius:8px;padding:8px 12px;text-align:center;min-width:60px;"><div style="font-size:16px;margin-bottom:2px;">' + esc(step.icon||'\ud83d\udccb') + '</div><div style="font-size:11px;font-weight:600;color:#333;">' + esc(step.label) + '</div></div>' + (i<steps.length-1?'<div style="color:#C65D3B;font-size:16px;font-weight:bold;">\u2192</div>':'') + '</div>'; }).join('')
      + '</div></div>';
    wrap2.innerHTML = wHtml;
    body.appendChild(wrap2);
  }

  card.appendChild(body);
  return card;
}

/* ============ 要点页 - 2x2 网格 ============ */
function buildPoints(data) {
  var card = document.createElement('div');
  card.className = 'card card-points-v2';

  var tag = document.createElement('span');
  tag.className = 'section-tag';
  tag.textContent = (data.label || '\u8981\u70b9') + (data.count ? ' ' + data.count + ' \u6761' : '');
  card.appendChild(tag);

  var items = data.items;
  if (items.length <= 4) {
    var grid = document.createElement('div');
    grid.className = 'points-grid';
    items.forEach(function(p) {
      var pc = document.createElement('div'); pc.className = 'point-card';
      var icon = document.createElement('div'); icon.className = 'point-card-icon'; icon.textContent = p.icon || '\u25cf'; pc.appendChild(icon);
      var t = document.createElement('div'); t.className = 'point-card-title'; t.textContent = p.title; pc.appendChild(t);
      var d = document.createElement('div'); d.className = 'point-card-desc'; d.textContent = p.desc; pc.appendChild(d);
      grid.appendChild(pc);
    });
    card.appendChild(grid);
  } else {
    var list = document.createElement('div'); list.className = 'points-compact';
    var start = data.startNum || 1;
    items.forEach(function(p,i) {
      var row = document.createElement('div'); row.className = 'point-row';
      var num = document.createElement('span'); num.className = 'point-row-num';
      if (p.icon) { num.textContent = p.icon; num.style.fontSize = '16px'; } else { num.textContent = start+i; }
      row.appendChild(num);
      var content = document.createElement('div');
      var t = document.createElement('div'); t.className = 'point-row-title'; t.textContent = p.title; content.appendChild(t);
      var d = document.createElement('div'); d.className = 'point-row-desc'; d.textContent = p.desc; content.appendChild(d);
      row.appendChild(content);
      list.appendChild(row);
    });
    card.appendChild(list);
  }
  return card;
}

/* ============ 引用页 - 大引号居中 ============ */
function buildQuote(data) {
  var card = document.createElement('div');
  card.className = 'card card-quote-v2';

  var mark = document.createElement('div');
  mark.className = 'quote-mark'; mark.textContent = '\u201c';
  card.appendChild(mark);

  var text = document.createElement('p');
  text.className = 'quote-v2-text'; text.textContent = data.text;
  card.appendChild(text);

  if (data.source) {
    var src = document.createElement('p');
    src.className = 'quote-v2-source'; src.textContent = '\u2014 ' + data.source;
    card.appendChild(src);
  }
  if (data.note) {
    var note = document.createElement('div');
    note.className = 'quote-v2-note';
    data.note.split('\n').forEach(function(part, i) {
      note.appendChild(document.createTextNode(part));
      if (i < data.note.split('\n').length - 1) note.appendChild(document.createElement('br'));
    });
    card.appendChild(note);
  }
  return card;
}

/* ============ 洞察页 - 横向pill ============ */
function buildInsight(data) {
  var card = document.createElement('div');
  card.className = 'card card-insight-v2';

  var tag = document.createElement('span');
  tag.className = 'section-tag'; tag.textContent = data.tag || '\u80cc\u540e\u903b\u8f91';
  card.appendChild(tag);

  var coreBox = document.createElement('div'); coreBox.className = 'insight-core-box';
  var coreText = document.createElement('p'); coreText.className = 'insight-core-text'; coreText.textContent = data.core;
  coreBox.appendChild(coreText);
  card.appendChild(coreBox);

  if (data.details && data.details.length > 0) {
    var wrap = document.createElement('div'); wrap.className = 'insight-details-wrap';
    data.details.forEach(function(d) {
      var row = document.createElement('div'); row.className = 'insight-detail-row';
      var label = document.createElement('span'); label.className = 'insight-detail-label'; label.textContent = d.bold;
      row.appendChild(label);
      var txt = document.createElement('span'); txt.className = 'insight-detail-text'; txt.textContent = d.text;
      row.appendChild(txt);
      wrap.appendChild(row);
    });
    card.appendChild(wrap);
  }

  if (data.tip) {
    var tip = document.createElement('div'); tip.className = 'insight-tip-bar'; tip.textContent = '\ud83d\udca1 ' + data.tip;
    card.appendChild(tip);
  }
  return card;
}

/* ============ 尾页 ============ */
function buildEnd(data) {
  var takeaway = data.takeaway, footer = data.footer;
  var card = document.createElement('div');
  card.className = 'card card-end-v2';

  var main = document.createElement('div'); main.className = 'end-v2-main';

  if (takeaway) {
    var title = document.createElement('h3');
    title.className = 'end-v2-title'; title.textContent = takeaway.title;
    main.appendChild(title);

    if (takeaway.codeStyle) {
      var codeWrap = document.createElement('div');
      codeWrap.style.cssText = 'background:#1e1e1e;border-radius:12px;padding:14px;font-family:"SF Mono",Consolas,monospace;';
      // Terminal dots + code lines from trusted template data
      var cHtml = '<div style="display:flex;gap:6px;margin-bottom:10px;">'
        + '<span style="width:10px;height:10px;border-radius:50%;background:#ff5f56;"></span>'
        + '<span style="width:10px;height:10px;border-radius:50%;background:#ffbd2e;"></span>'
        + '<span style="width:10px;height:10px;border-radius:50%;background:#27ca40;"></span></div>';
      takeaway.items.forEach(function(item) {
        cHtml += '<div style="margin-bottom:8px;"><div style="color:#888;font-size:9px;margin-bottom:2px;"># ' + esc(item.note) + '</div><div style="color:#4EC9B0;font-size:11px;word-break:break-all;"><span style="color:#C586C0;">$</span> ' + esc(item.text) + '</div></div>';
      });
      if (takeaway.verifyCommands) {
        cHtml += '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #333;"><div style="color:#888;font-size:9px;margin-bottom:6px;"># \u5b89\u88c5\u6210\u529f\u540e\u53ef\u7528\u547d\u4ee4\uff1a</div>';
        takeaway.verifyCommands.forEach(function(cmd) { cHtml += '<div style="color:#6A9955;font-size:10px;margin-bottom:2px;">' + esc(cmd) + '</div>'; });
        cHtml += '</div>';
      }
      codeWrap.innerHTML = cHtml;
      main.appendChild(codeWrap);
    } else {
      var list = document.createElement('div');
      list.style.cssText = 'display:flex;flex-direction:column;gap:12px;';
      takeaway.items.forEach(function(item) {
        var row = document.createElement('div');
        row.style.cssText = 'display:flex;gap:10px;align-items:flex-start;background:#fff;padding:12px;border-radius:10px;';
        var icon = document.createElement('span'); icon.style.cssText = 'color:#C65D3B;font-size:14px;font-weight:700;'; icon.textContent = '\u2713';
        row.appendChild(icon);
        var w = document.createElement('div');
        var ct = document.createElement('p'); ct.style.cssText = 'font-size:13px;line-height:1.4;color:#1a1a1a;font-weight:500;'; ct.textContent = item.text; w.appendChild(ct);
        if (item.note) { var cn = document.createElement('p'); cn.style.cssText = 'font-size:11px;color:#888;margin-top:2px;'; cn.textContent = item.note; w.appendChild(cn); }
        row.appendChild(w); list.appendChild(row);
      });
      main.appendChild(list);
    }
  }

  if (footer.cta) {
    var cta = document.createElement('div'); cta.className = 'end-v2-cta';
    var ctaText = document.createElement('span'); ctaText.className = 'end-v2-cta-text'; ctaText.textContent = footer.cta;
    cta.appendChild(ctaText); main.appendChild(cta);
  }
  card.appendChild(main);

  var ft = document.createElement('div'); ft.className = 'end-v2-footer';
  var logoImg = document.createElement('img'); logoImg.src = 'assets/logos/OfoxAI-dark.png'; logoImg.alt = 'OFOX AI';
  ft.appendChild(logoImg);
  var slogan = document.createElement('span'); slogan.className = 'end-slogan'; slogan.textContent = footer.slogan || 'ofox.ai \u4f60\u7684AI\u4f19\u4f34';
  ft.appendChild(slogan);
  card.appendChild(ft);
  return card;
}

render();
</script>
