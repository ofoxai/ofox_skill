// ============================================================
// 核心渲染逻辑
// ============================================================
window._isGradient = false;
window._isZine = false;

function normalizeData(data) {
  if (data.pages) return data;
  var pages = [];
  pages.push({ type: 'cover', data: data });
  if (data.intro) pages.push({ type: 'intro', data: data.intro });
  if (data.pointsPages && data.pointsPages.length > 0) {
    data.pointsPages.forEach(function(pp) { pages.push({ type: 'points', data: pp }); });
  } else if (data.points && data.points.length > 0) {
    pages.push({ type: 'points', data: { label: data.pointsLabel || '要点', count: data.points.length, items: data.points } });
  }
  if (data.quotes && data.quotes.length > 0) {
    data.quotes.forEach(function(q) { pages.push({ type: 'quote', data: q }); });
  }
  if (data.insight) pages.push({ type: 'insight', data: data.insight });
  pages.push({ type: 'end', data: { takeaway: data.takeaway, footer: data.footer || {} } });
  return { theme: data.theme || 'copper', gradientTheme: data.gradientTheme, pages: pages };
}

function applyTheme(name, gradientSub) {
  window._isGradient = false;
  window._isZine = false;
  if (name === 'gradient') {
    window._isGradient = true;
    document.getElementById('theme-css').textContent = buildGradientTheme(gradientSub || 'blue');
  } else if (name === 'zine') {
    window._isZine = true;
    document.getElementById('theme-css').textContent = THEMES['zine'];
  } else {
    document.getElementById('theme-css').textContent = THEMES[name] || THEMES['copper'];
  }
}

function render(customData) {
  var raw = customData || window.DATA || {};
  var data = normalizeData(raw);
  applyTheme(data.theme || 'copper', data.gradientTheme);

  var total = data.pages.length;
  var output = document.getElementById('output');
  output.textContent = '';

  var watermarkLogo = data.watermark && data.watermark.logo ? data.watermark.logo : '';
  var watermarkText = data.watermark && data.watermark.text ? data.watermark.text : '';

  // 推导 logo 基础路径（从数据中第一个 logo URL 或 watermark 路径）
  // 如果外部已手动设置 _logoBase（如无封面 logo 的场景），保留该值
  var _logoBasePreset = window._logoBase && window._logoBase !== 'assets/logos/';
  if (!_logoBasePreset) window._logoBase = 'assets/logos/';
  var sampleLogo = watermarkLogo || '';
  if (!sampleLogo) {
    data.pages.some(function(p) {
      var logos = p.data && p.data.logos;
      if (logos && logos.length && logos[0].url) { sampleLogo = logos[0].url; return true; }
    });
  }
  if (sampleLogo) {
    var lastSlash = sampleLogo.lastIndexOf('/');
    if (lastSlash >= 0) window._logoBase = sampleLogo.substring(0, lastSlash + 1);
  }

  data.pages.forEach(function(page, idx) {
    var comp = COMPONENTS[page.type];
    if (!comp) return;
    var html = comp.build(page.data, idx + 1, total);
    output.insertAdjacentHTML('beforeend', html);
    // 水印注入（跳过封面、尾页；zine模式已有报头品牌，跳过）
    if (watermarkLogo && !window._isZine && page.type !== 'cover' && page.type !== 'end') {
      var cards = output.querySelectorAll('.card');
      var lastCard = cards[cards.length - 1];
      if (lastCard) {
        var wmHtml = '<div class="watermark">' +
          '<img src="' + watermarkLogo + '" alt="">' +
          (watermarkText ? '<span>' + watermarkText + '</span>' : '') +
        '</div>';
        lastCard.insertAdjacentHTML('afterbegin', wmHtml);
      }
    }
  });

  adjustTitleFontSize();
  setTimeout(function() {
    autoFillBlank();
    auditAndFixLayout();
  }, 50);
}

function adjustTitleFontSize() {
  document.querySelectorAll('.cover-title').forEach(function(title) {
    var fontSize = parseInt(getComputedStyle(title).fontSize) || 35;
    var singleLineHeight = fontSize * 1.3;
    while (title.scrollHeight > singleLineHeight * 1.5 && fontSize > 22) {
      fontSize -= 1;
      title.style.fontSize = fontSize + 'px';
    }
  });
}

// ========== 空白检测与智能布局自适应 ==========
function autoFillBlank() {
  // --- 工具函数 ---
  // 计算容器内部空白
  function measureBlank(el) {
    var h = 0;
    for (var i = 0; i < el.children.length; i++) h += el.children[i].offsetHeight;
    return el.offsetHeight - h;
  }

  // flex column 容器：仅增大 gap 来填充空白
  // 不改 justifyContent，保持 tag 在顶部位置一致
  // 自带溢出保护：设完 gap 后检查，溢出就回退
  function spreadFlex(el, maxGap) {
    var blank = measureBlank(el);
    if (blank < 40) return false;
    var n = el.children.length;
    if (n > 1) {
      var cur = parseInt(getComputedStyle(el).gap) || 6;
      var idealGap = Math.floor(blank / (n - 1)) + cur;
      var newGap = Math.min(idealGap, maxGap || 48);
      el.style.gap = newGap + 'px';
      // 溢出保护：逐步缩减直到不溢出
      var card = el.closest('.card');
      if (card) {
        while (card.scrollHeight > 480 && newGap > cur) {
          newGap -= 2;
          el.style.gap = newGap + 'px';
        }
      }
    }
    return true;
  }

  // grid 容器：扩大 gap + 居中
  function spreadGrid(el) {
    var cs = getComputedStyle(el);
    if (cs.display !== 'grid') return false;
    var blank = measureBlank(el);
    if (blank < 40) return false;
    el.style.alignContent = 'center';
    var cur = parseInt(cs.gap) || 12;
    var rows = Math.ceil(el.children.length / parseInt(cs.gridTemplateColumns.split(' ').length || 3));
    if (rows > 1) {
      var extra = Math.floor(blank / rows);
      el.style.rowGap = Math.min(cur + extra, 36) + 'px';
    }
    return true;
  }

  // injectDecor 已禁用 — 装饰元素容易破坏间距均衡，弊大于利

  // --- 已知组件容器选择器 ---
  var FLEX_SELECTORS = [
    '.points-section', '.timeline-line', '.logic-list',
    '.points-problems', '.points-showcase', '.points-numbered', '.points-cards',
    '.rating-dims', '.stats-bars', '.stats-featured',
    '.code-terminal', '.timeline-hz',
    '.quote-box', '.pullquote-box', '.quote-card-wrapper',
    '.info-table-body', '.highlight-block-main',
    '.end-main', '.checklist-list',
    '.versus-table-rows',
    '.insight-centered', '.insight-metrics',
    '.do-dont-grid', '.checklist-grid', '.number-highlight-main',
    '.ranking-list', '.faq-list', '.formula-main'
  ].join(', ');

  var GRID_SELECTORS = '.stats-grid, .gallery-grid';

  // --- 主逻辑 ---
  var cards = document.querySelectorAll('.card');
  cards.forEach(function(card) {
    var cardBlank = measureBlank(card);

    // 1. Card 级空白 ≥ 60px：先用已知选择器精准处理
    if (cardBlank >= 60) {
      // 1a: 标准模板 inline-style flex 容器
      var mainFlex = card.querySelector('[style*="flex:1;display:flex;flex-direction:column"]');
      if (mainFlex) { spreadFlex(mainFlex, 28); return; }

      // 1b: 已知组件类名
      var known = card.querySelector(FLEX_SELECTORS);
      if (known) {
        var kcs = getComputedStyle(known);
        if (kcs.display === 'flex') { spreadFlex(known, 32); return; }
      }

      // 1c: Grid 容器
      var grid = card.querySelector(GRID_SELECTORS);
      if (grid) { spreadGrid(grid); return; }

      // 1d: 不改 justifyContent，由 gap 控制间距
    }

    // 2. 深入 flex-grow:1 子容器（zine 等自定义布局，覆盖所有模板）
    for (var j = 0; j < card.children.length; j++) {
      var child = card.children[j];
      var cs = getComputedStyle(child);
      if (cs.flexGrow < 1) continue;

      if (cs.display === 'flex' && cs.flexDirection === 'column') {
        var innerBlank = measureBlank(child);
        if (innerBlank >= 40) {
          spreadFlex(child, 48);
        }
      } else if (cs.display === 'grid') {
        spreadGrid(child);
      }
    }

    // 3. 二层深入：flex:1 → flex:1 嵌套（部分组件有双层包装）
    var deepContainers = card.querySelectorAll(FLEX_SELECTORS + ', ' + GRID_SELECTORS);
    deepContainers.forEach(function(dc) {
      var dcs = getComputedStyle(dc);
      if (dcs.display === 'grid') { spreadGrid(dc); return; }
      if (dcs.display === 'flex' && dcs.flexDirection === 'column') {
        spreadFlex(dc, 32);
      }
    });
  });
}

// ========== 溢出修复 + 间距均衡 ==========
function auditAndFixLayout() {
  var CARD_H = 480;

  // --- 找到 card 内的主内容容器（flex column + flex:1 的那个） ---
  function findMainContainer(card) {
    var children = card.children;
    for (var i = 0; i < children.length; i++) {
      var cs = getComputedStyle(children[i]);
      if (cs.flexGrow >= 1 && cs.display === 'flex' && cs.flexDirection === 'column') {
        return children[i];
      }
    }
    // fallback: 最大的 flex column 子元素
    var best = null, bestH = 0;
    for (var i = 0; i < children.length; i++) {
      var cs = getComputedStyle(children[i]);
      if (cs.display === 'flex' && cs.flexDirection === 'column' && children[i].offsetHeight > bestH) {
        best = children[i];
        bestH = children[i].offsetHeight;
      }
    }
    return best;
  }

  // --- 找到列表容器（含多个同级子项的 flex/grid 容器） ---
  function findListContainer(root) {
    // 优先找已知组件类名
    var known = root.querySelector(
      '.points-section, .points-showcase, .points-numbered, .points-cards, ' +
      '.timeline-line, .logic-list, .rating-dims, .stats-bars, .stats-featured, ' +
      '.checklist-list, .versus-table-rows, .gallery-grid, .stats-grid, ' +
      '.do-dont-grid, .checklist-grid, .ranking-list, .faq-list'
    );
    if (known && known.children.length >= 2) return known;
    // 找含 zine-clipping 等列表项的父容器
    var listItem = root.querySelector('.zine-clipping, .points-item, .timeline-event');
    if (listItem && listItem.parentElement.children.length >= 2) return listItem.parentElement;
    // fallback: 最多子元素的 flex column 容器
    var containers = root.querySelectorAll('*');
    var best = null, bestN = 1;
    for (var i = 0; i < containers.length; i++) {
      var cs = getComputedStyle(containers[i]);
      if ((cs.display === 'flex' && cs.flexDirection === 'column') || cs.display === 'grid') {
        if (containers[i].children.length > bestN) {
          best = containers[i];
          bestN = containers[i].children.length;
        }
      }
    }
    return best;
  }

  // === PASS 1: 溢出修复 ===
  var cards = document.querySelectorAll('.card');
  cards.forEach(function(card) {
    var overflow = card.scrollHeight - CARD_H;
    if (overflow <= 2) return; // 不溢出，跳过

    var main = findMainContainer(card);
    var target = main || card;

    // 策略1: 缩减 gap（最高效）
    var list = findListContainer(target);
    if (list) {
      var cs = getComputedStyle(list);
      var curGap = parseInt(cs.gap) || parseInt(cs.rowGap) || 12;
      var minGap = 4;
      while (card.scrollHeight > CARD_H && curGap > minGap) {
        curGap -= 2;
        list.style.gap = curGap + 'px';
      }
      overflow = card.scrollHeight - CARD_H;
    }

    // 策略2: 缩减 padding（上下各减）
    if (overflow > 2) {
      var inner = card.querySelector('.page-inner') || target;
      var cs2 = getComputedStyle(inner);
      var pt = parseInt(cs2.paddingTop) || 0;
      var pb = parseInt(cs2.paddingBottom) || 0;
      while (card.scrollHeight > CARD_H && (pt > 12 || pb > 12)) {
        if (pt > 12) { pt -= 2; inner.style.paddingTop = pt + 'px'; }
        if (pb > 12) { pb -= 2; inner.style.paddingBottom = pb + 'px'; }
      }
      overflow = card.scrollHeight - CARD_H;
    }

    // 策略3: 隐藏装饰元素（zine washi tape, decor dividers）
    if (overflow > 2) {
      var decors = card.querySelectorAll('.zine-washi-tape, .zine-tape-decor, [class*="decor"]');
      for (var d = decors.length - 1; d >= 0 && card.scrollHeight > CARD_H; d--) {
        decors[d].style.display = 'none';
      }
      overflow = card.scrollHeight - CARD_H;
    }

    // 策略4: 缩小字体（最后手段，最多缩2px）
    if (overflow > 2 && list) {
      var texts = list.querySelectorAll('p, span, div');
      for (var t = 0; t < texts.length && card.scrollHeight > CARD_H; t++) {
        var fs = parseInt(getComputedStyle(texts[t]).fontSize) || 14;
        if (fs > 11) texts[t].style.fontSize = (fs - 1) + 'px';
      }
    }

    // 仍然溢出 → 强制隐藏最后可裁剪的子元素
    if (card.scrollHeight > CARD_H + 2) {
      // 封面溢出：优先隐藏 stats-bar，其次 keywords
      var statsBar = card.querySelector('.cover-stats-bar');
      if (statsBar) { statsBar.style.display = 'none'; }
      if (card.scrollHeight > CARD_H + 2) {
        var kwBlock = card.querySelector('.cover-keywords');
        if (kwBlock) { kwBlock.style.display = 'none'; }
      }
      // 通用：裁剪最后一个非必要子元素的文字
      if (card.scrollHeight > CARD_H + 2) {
        card.style.overflow = 'hidden';
      }
    }
  });

  // === PASS 2: 间距均衡 ===
  cards.forEach(function(card) {
    if (card.scrollHeight > CARD_H + 2) return; // 溢出的不处理

    var main = findMainContainer(card);
    if (!main) return;
    var list = findListContainer(main);
    if (!list || list.children.length < 2) return;

    var cs = getComputedStyle(list);
    if (cs.display === 'grid') return; // grid 靠 CSS 自身对齐

    // 先移除被 injectDecor 错误插入的装饰元素（老输出兼容）
    var injectedDecors = list.querySelectorAll('.zine-washi-tape, [class*="decor"]');
    injectedDecors.forEach(function(d) { d.remove(); });

    // 计算列表子项之间的实际间距（只看实际内容项）
    var items = Array.from(list.children).filter(function(c) {
      return c.offsetHeight > 10; // 排除微小装饰元素
    });
    var gaps = [];
    for (var i = 1; i < items.length; i++) {
      var prevBot = items[i-1].getBoundingClientRect().bottom;
      var currTop = items[i].getBoundingClientRect().top;
      gaps.push(currTop - prevBot);
    }
    if (gaps.length === 0) return;

    // 间距差异 > 4px 时才做均衡
    var maxGap = Math.max.apply(null, gaps);
    var minGap = Math.min.apply(null, gaps);
    if (maxGap - minGap <= 4) return;

    // 用 gap 属性统一间距（取平均值，确保不溢出）
    var avgGap = Math.round(gaps.reduce(function(a,b){return a+b;}, 0) / gaps.length);
    list.style.gap = avgGap + 'px';

    // 验证统一后没溢出
    if (card.scrollHeight > CARD_H) {
      // 回退：用较小的间距
      list.style.gap = Math.max(minGap, 4) + 'px';
    }
  });
}
